    <meta name="twitter:card" content="summary">

    <meta name="twitter:description" content="Simple Rubik's Cube Simulator in the browser, with scramble, timer, and move counter features.">
    <meta name="twitter:image" content="https://sone0123.github.io/classic/public/web-app-manifest-512x512.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&family=Noto+Sans+Mono:wght@100..900&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../public/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../public/favicon.svg" />
    <link rel="shortcut icon" href="../public/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../public/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Puzzles" />
    <link rel="manifest" href="../public/site.webmanifest" />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- SEO: Structured data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Rubik's Cube Simulator",
        "url": "https://sone0123.github.io/classic/rubikscube/",
        "description": "A simple Rubik's Cube Simulator in the browser, with scramble, timer, and move counter features.",
        "applicationCategory": "Game",
        "operatingSystem": "Web browser",
        "publisher": {
            "@type": "Person",
            "name": "Sone",
            "url": "https://github.com/sone0123"
        },
        "isPartOf": {
            "@type": "WebSite",
            "name": "Puzzle Collection",
            "url": "https://sone0123.github.io/classic/"
        }
    }
    </script>
</head>
<body>
    <!-- SEO: Accessibility -->
    <main class="visually-hidden">
        <h1>Rubik's Cube Simulator</h1>
        <p>Simple Rubik's Cube Simulator in the browser, with scramble, timer, and move counter features.</p>
    </main>

    <!-- ホームボタン -->
    <a id="homeBtn" href=".." aria-label="Home" title="Home">
        <svg
            xmlns="http://www.w3.org/2000/svg"
            width="22" height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
        >
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
    </a>

    <!-- スクランブルボタン -->
    <button id="scrambleBtn" aria-label="Scramble" title="Scramble">
        <svg
            xmlns="http://www.w3.org/2000/svg"
            width="22" height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
        >
            <polyline points="16 3 21 3 21 8"></polyline>
            <line x1="4" y1="20" x2="21" y2="3"></line>
            <polyline points="21 16 21 21 16 21"></polyline>
            <line x1="15" y1="15" x2="21" y2="21"></line>
            <line x1="4" y1="4" x2="9" y2="9"></line>
        </svg>
    </button>

    <!-- HUD -->
    <div id="statusHUD">
        <span id="timerDisplay">00:00</span> / <span id="moveCountDisplay">0</span>
    </div>

    <!-- キューブ -->
    <div class="scene">
        <div class="cube" id="cube">
        </div>
    </div>

    <!-- スクリプト -->
    <script src="script.js"></script>
</body>
</html>
